<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>毕业书 · 青春问答</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background-color: #ffffff;
  font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
  color: #000;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 2rem 1.5rem;
}

.book-container {
  max-width: 750px;
  width: 100%;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 2px 30px rgba(0,0,0,0.03), 0 4px 8px rgba(0,0,0,0.05);
}

.question-panel, .result-panel {
  padding: 2rem 2.5rem;
}

.hero-title {
  font-size: 2.8rem;
  font-weight: 700;
  letter-spacing: -0.01em;
  margin-bottom: 0.5rem;
  border-left: 6px solid #000;
  padding-left: 1.2rem;
}

.sub {
  color: #2c2c2c;
  font-size: 0.95rem;
  margin-bottom: 0.5rem;
  padding-left: 1.8rem;
  opacity: 0.7;
}

.question-number {
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 500;
  color: #3a3a3a;
  margin-bottom: 0.5rem;
}

.question-text {
  font-size: 1.7rem;
  font-weight: 600;
  margin-bottom: 2rem;
}

.answer-area {
  margin-bottom: 2.5rem;
}

label {
  display: block;
  font-size: 0.9rem;
  font-weight: 500;
  margin-bottom: 0.5rem;
  color: #1f1f1f;
}

input, textarea {
  width: 100%;
  padding: 0.9rem 1rem;
  font-size: 1rem;
  font-family: inherit;
  background: #f9f9f9;
  border: 1px solid #e2e2e2;
  border-radius: 20px;
  outline: none;
}

input:focus, textarea:focus {
  border-color: #000;
  background: #fff;
}

textarea {
  min-height: 90px;
  resize: vertical;
}

.button-group {
  display: flex;
  justify-content: space-between;
  gap: 1rem;
  margin-top: 0.5rem;
}

button {
  background: #000;
  border: none;
  color: white;
  font-weight: 600;
  padding: 0.8rem 1.6rem;
  border-radius: 60px;
  font-size: 0.95rem;
  cursor: pointer;
  transition: 0.2s;
}

button.secondary {
  background: #f0f0f0;
  color: #1a1a1a;
  border: 1px solid #ccc;
}

button:hover:not(:disabled) {
  background: #2c2c2c;
  transform: scale(0.98);
}

button:disabled {
  opacity: 0.45;
  cursor: not-allowed;
  transform: none;
}

button.danger {
  background: #cc3333;
  color: #fff;
}

.result-table-wrapper {
  overflow-x: auto;
  margin: 1.5rem 0 2rem;
  border-radius: 24px;
  border: 1px solid #ececec;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.95rem;
}

th {
  text-align: left;
  padding: 1rem;
  background: #fafafa;
  border-bottom: 1px solid #eaeaea;
  font-weight: 600;
}

td {
  padding: 1rem;
  border-bottom: 1px solid #f0f0f0;
  word-break: break-word;
}

.empty-answer {
  color: #8a8a8a;
  font-style: italic;
}

.action-buttons {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  margin-top: 1rem;
}

.progress {
  font-size: 0.8rem;
  color: #4d4d4d;
  text-align: right;
  margin-bottom: 1rem;
}

footer {
  text-align: center;
  font-size: 0.7rem;
  margin-top: 2rem;
  color: #aaa;
}

@media (max-width: 550px) {
  .hero-title { font-size: 2.2rem; }
  .question-panel, .result-panel { padding: 1.5rem; }
}
</style>
</head>

<body>
<div class="book-container" id="app"></div>

<script>
const QUESTIONS = [
  { id: 0, text: "你的名字" },
  { id: 1, text: "你最想干什么" },
  { id: 2, text: "你和谁玩得最好" },
  { id: 3, text: "你将来想去哪里发展" },
  { id: 4, text: "你对哪位老师最有好感" },
  { id: 5, text: "你最喜欢对朋友说什么" },
  { id: 6, text: "你哪门学科最拿手" },
  { id: 7, text: "有没有哪位同学让你印象深刻？（可填“没有”“保密”或名字）" }
];

let answers = new Array(QUESTIONS.length).fill("");
let currentIndex = 0;
const appRoot = document.getElementById("app");

function saveCurrentAnswer() {
  const inputEl = document.querySelector(`[data-qid="${currentIndex}"]`);
  if (inputEl) answers[currentIndex] = inputEl.value;
}

function escapeHtml(str) {
  if (!str) return "";
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function renderInputByQuestion(qid, currentAnswer) {
  if (qid === 0) {
    return `<input type="text" data-qid="${qid}" placeholder="你猜 / 不告诉你 / 没有 / 或者写名字" value="${escapeHtml(currentAnswer)}">`;
  }
  return `<textarea data-qid="${qid}" placeholder="写下你的答案...">${escapeHtml(currentAnswer)}</textarea>`;
}

function renderQuestionPage() {
  const q = QUESTIONS[currentIndex];
  const isLast = currentIndex === QUESTIONS.length - 1;

  appRoot.innerHTML = `
    <div class="question-panel">
      <div class="hero-title">拾忆青春 · 致少年</div>
      <div class="sub">青春问卷</div>
      <div class="progress">进度 ${currentIndex + 1} / ${QUESTIONS.length}</div>
      <div class="question-number">问题 ${currentIndex + 1}</div>
      <div class="question-text">${escapeHtml(q.text)}</div>

      <div class="answer-area">
        <label>写下你的回答</label>
        ${renderInputByQuestion(currentIndex, answers[currentIndex])}
      </div>

      <div class="button-group">
        ${currentIndex > 0
          ? `<button id="prevBtn" class="secondary">← 上一题</button>`
          : `<div></div>`
        }
        <button id="nextOrSubmitBtn">${isLast ? "完成 & 生成毕业书" : "下一题 →"}</button>
      </div>

      <div class="action-buttons" style="justify-content:flex-end;">
        <button id="viewResultBtn" class="secondary">直接查看结果</button>
      </div>
    </div>
  `;

  const textarea = appRoot.querySelector("textarea");
  if (textarea) {
    textarea.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
      }
    });
  }

  document.getElementById("prevBtn")?.addEventListener("click", () => {
    saveCurrentAnswer();
    currentIndex--;
    renderQuestionPage();
  });

  document.getElementById("nextOrSubmitBtn")?.addEventListener("click", () => {
    saveCurrentAnswer();
    if (isLast) {
      renderResultPage();
    } else {
      currentIndex++;
      renderQuestionPage();
    }
  });

  document.getElementById("viewResultBtn")?.addEventListener("click", () => {
    saveCurrentAnswer();
    const allFilled = answers.every(ans => ans.trim() !== "");
    if (allFilled || confirm("还有题目未完成，确定查看结果吗？")) {
      renderResultPage();
    }
  });
}

function renderResultPage() {
  let rows = "";
  for (let i = 0; i < QUESTIONS.length; i++) {
    const raw = answers[i]?.trim();
    rows += `
      <tr>
        <th style="width:35%">${escapeHtml(QUESTIONS[i].text)}</th>
        <td>${raw ? escapeHtml(raw) : '<span class="empty-answer">未填写</span>'}</td>
      </tr>
    `;
  }

  appRoot.innerHTML = `
    <div class="result-panel">
      <div class="hero-title">你的毕业书</div>
      <div class="sub">青春问卷</div>

      <div class="result-table-wrapper">
        <table>${rows}</table>
      </div>

      <div class="action-buttons">
        <button id="backEditBtn" class="secondary">← 返回修改</button>
        <button id="resetAllBtn" class="secondary danger">清空所有回答</button>
      </div>

      <footer>每一份答案都是成长 | 毕业快乐</footer>
    </div>
  `;

  document.getElementById("backEditBtn")?.addEventListener("click", () => {
    renderQuestionPage();
  });

  document.getElementById("resetAllBtn")?.addEventListener("click", () => {
    if (confirm("确定清空全部回答吗？此操作不可撤回！")) {
      answers = new Array(QUESTIONS.length).fill("");
      currentIndex = 0;
      renderQuestionPage();
    }
  });
}

document.addEventListener("DOMContentLoaded", renderQuestionPage);
</script>
</body>
</html>
